<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000000">
  <meta name="robots" content="noindex">
  <title>Страница не найдена</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-width: 320px;
      min-height: 100%;
      margin: 0;
      background: #000;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      overflow: hidden;
      color: #fff;
    }

    .page {
      position: relative;
      isolation: isolate;
      display: grid;
      min-height: 100vh;
      min-height: 100svh;
      place-items: center;
      padding: 32px;
      overflow: hidden;
      background:
        linear-gradient(to bottom, transparent 45%, rgba(0, 0, 0, 0.08) 62%, rgba(0, 0, 0, 0) 100%),
        #000 url("/images/background.png") bottom center / 100% auto no-repeat;
    }

    .page::before {
      position: absolute;
      z-index: -1;
      inset: 0;
      background:
        radial-gradient(circle at 14% 18%, rgba(95, 137, 183, 0.13), transparent 1px),
        radial-gradient(circle at 79% 13%, rgba(255, 255, 255, 0.16), transparent 1px),
        radial-gradient(circle at 64% 32%, rgba(135, 175, 214, 0.11), transparent 1px);
      background-size: 173px 173px, 241px 241px, 307px 307px;
      content: "";
    }

    .message {
      position: relative;
      top: -5vh;
      display: grid;
      justify-items: center;
      gap: clamp(28px, 4vh, 52px);
      text-align: center;
      animation: appear 1.1s ease-out both;
    }

    .error-code {
      margin: 0;
      color: #78c9ee;
      font-size: clamp(6rem, 18vw, 14rem);
      font-weight: 260;
      line-height: 0.78;
      letter-spacing: -0.07em;
    }

    h1 {
      max-width: 1050px;
      margin: 0;
      padding: 0 20px;
      color: #f4f7fa;
      font-size: clamp(1.65rem, 4vw, 4rem);
      font-weight: 420;
      line-height: 1.15;
      letter-spacing: 0.015em;
      text-align: center;
      text-wrap: balance;
    }

    @keyframes appear {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .message {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="message">
      <p class="error-code" aria-hidden="true">404</p>
      <h1>Это не те дроиды, что вы ищете</h1>
    </div>
  </main>
</body>
</html>
